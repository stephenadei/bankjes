<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stephen's Bankjes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  :root {
    --cream:    #faf7f0;
    --paper:    #fffdf6;
    --moss:     #5b7a3f;
    --bark:     #6b5d4f;
    --ink:      #2d2a26;
    --muted:    #857d72;
    --line:     rgba(45, 42, 38, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: var(--cream);
  }

  #map { position: fixed; inset: 0; z-index: 0; background: var(--cream); }

  /* tile-cleanup voor warmer karakter */
  .leaflet-tile-pane { filter: saturate(0.85) contrast(0.97); }

  .glass {
    background: rgba(255, 253, 246, 0.92);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    box-shadow:
      0 1px 3px rgba(45, 42, 38, 0.08),
      0 0 0 1px var(--line);
  }

  .brand {
    position: fixed; top: 12px; left: 12px; z-index: 1000;
    border-radius: 12px;
    padding: 8px 13px;
    display: inline-flex; align-items: baseline; gap: 7px;
    line-height: 1.1;
    white-space: nowrap;
  }
  .brand .mark { font-size: 15px; line-height: 1; }
  .brand .title {
    font-family: 'Fraunces', ui-serif, Georgia, serif;
    font-weight: 500;
    font-size: 15px;
    font-variation-settings: "opsz" 18;
    letter-spacing: -0.005em;
  }
  .brand .status {
    color: var(--muted);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    margin-left: 2px;
  }

  /* 5 ronde icon-buttons in een verticale kolom langs rechterrand */
  .icons {
    position: fixed; top: 12px; right: 12px; z-index: 1000;
    display: flex; flex-direction: column; gap: 6px;
  }
  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    position: relative;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.93); }
  .icon-btn .swatch {
    width: 11px; height: 11px;
    border-radius: 50%;
  }
  .icon-btn.bench .swatch {
    width: 18px; height: 18px;
    border-radius: 0;
    background: transparent !important;
  }
  .icon-btn.bench svg { display: block; }
  .icon-btn.off { opacity: 0.42; }
  .icon-btn .count {
    position: absolute;
    bottom: -6px;
    right: -6px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 999px;
    font-size: 9px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    padding: 1px 5px;
    line-height: 1.4;
    box-shadow: 0 1px 2px rgba(45, 42, 38, 0.15), 0 0 0 1px var(--line);
    pointer-events: none;
  }
  .icon-btn.off .count { opacity: 0.6; }

  /* Subtiele cluster + popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--paper);
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(45, 42, 38, 0.18), 0 0 0 1px var(--line);
  }
  .leaflet-popup-content { margin: 12px 14px; font-size: 12px; line-height: 1.5; min-width: 200px; }
  .leaflet-popup-tip { background: var(--paper); }
  .pop-title {
    font-family: 'Fraunces', ui-serif, Georgia, serif;
    font-weight: 500; font-size: 15px;
    margin-bottom: 2px;
    font-variation-settings: "opsz" 14;
  }
  .pop-id { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; word-break: break-all; }
  .pop-row { display: grid; grid-template-columns: 96px 1fr; gap: 10px; padding: 1px 0; }
  .pop-row .k { color: var(--muted); font-size: 11px; }
  .pop-row .v { font-size: 12px; word-break: break-word; }

  .leaflet-bar a {
    background: rgba(255, 253, 246, 0.92) !important;
    color: var(--ink) !important;
    border-bottom-color: var(--line) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .leaflet-bar a:hover { background: var(--paper) !important; }
  .leaflet-control-attribution {
    background: rgba(255, 253, 246, 0.85) !important;
    color: var(--muted) !important;
    font-family: 'Inter', sans-serif;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--moss) !important; }

  @media (max-width: 540px) {
    .brand { padding: 7px 11px; }
    .brand .title { font-size: 14px; }
    .brand .status { display: none; }
    .icons { gap: 5px; }
    .icon-btn { width: 36px; height: 36px; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="brand glass">
  <span class="mark">🪑</span>
  <span class="title">Stephen's Bankjes</span>
  <span class="status" id="status">·</span>
</div>

<div class="icons" id="icons"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  // Mosgroen voor banken (hoofdrol), aardse tinten voor de rest
  const DATASETS = {
    bench:           { name: "Banken",         color: "#5b7a3f", featured: true,  defaultOn: true  },
    picnic_table:    { name: "Picknicktafels", color: "#7a8a47", defaultOn: false },
    trash_bin:       { name: "Afval",          color: "#6b5d4f", defaultOn: false },
    bike_pole:       { name: "Fietspaaltjes",  color: "#a06a3f", defaultOn: false },
    sports_facility: { name: "Sport",          color: "#7a4a72", defaultOn: false },
  };

  const map = L.map("map", {
    zoomControl: true,
    zoomAnimation: true,
    fadeAnimation: true,
    inertia: true,
    inertiaDeceleration: 2500,
    zoomAnimationDuration: 0.35,
  }).setView([52.3676, 4.9041], 13);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    subdomains: "abcd",
    attribution: '&copy; <a href="https://carto.com/" target="_blank" rel="noopener">CARTO</a> &middot; OSM &middot; <a href="https://api.data.amsterdam.nl/v1/" target="_blank" rel="noopener">data.amsterdam.nl</a>',
  }).addTo(map);

  function benchSvg(color, size) {
    size = size || 16;
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M5 12v6"/><path d="M19 12v6"/><path d="M5 8h14"/></svg>`;
  }

  function dotIcon(color, size) {
    size = size || 9;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:1.5px solid rgba(255,253,246,0.95);box-shadow:0 1px 2px rgba(45,42,38,0.35)"></div>`,
      className: "",
      iconSize: [size, size],
    });
  }

  function benchMarkerIcon(color) {
    return L.divIcon({
      html: `<div style="width:22px;height:22px;border-radius:50%;background:rgba(255,253,246,0.97);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(45,42,38,0.35);border:1.5px solid ${color}55">${benchSvg(color, 14)}</div>`,
      className: "",
      iconSize: [22, 22],
    });
  }

  const clusters = {};
  const enabled = {};
  for (const key of Object.keys(DATASETS)) {
    const meta = DATASETS[key];
    enabled[key] = !!meta.defaultOn;
    clusters[key] = L.markerClusterGroup({
      chunkedLoading: true,
      animateAddingMarkers: false,
      iconCreateFunction: (cluster) => {
        const n = cluster.getChildCount();
        const size = meta.featured ? 36 : 30;
        return L.divIcon({
          html: `<div style="background:${meta.color};color:#fffdf6;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;font-family:Inter,sans-serif;border:2px solid rgba(255,253,246,0.95);box-shadow:0 1px 3px rgba(45,42,38,0.30)">${n}</div>`,
          className: "",
          iconSize: [size, size],
        });
      },
    });
    if (enabled[key]) clusters[key].addTo(map);
  }

  const iconsEl = document.getElementById("icons");
  for (const [key, meta] of Object.entries(DATASETS)) {
    const btn = document.createElement("div");
    btn.className = "icon-btn glass" + (meta.featured ? " bench" : "") + (enabled[key] ? "" : " off");
    btn.dataset.key = key;
    btn.title = meta.name;
    const inner = meta.featured
      ? `<span class="swatch">${benchSvg(meta.color, 18)}</span>`
      : `<span class="swatch" style="background:${meta.color}"></span>`;
    btn.innerHTML = `${inner}<span class="count" id="count-${key}">…</span>`;
    btn.addEventListener("click", () => {
      enabled[key] = !enabled[key];
      btn.classList.toggle("off", !enabled[key]);
      if (enabled[key]) clusters[key].addTo(map);
      else map.removeLayer(clusters[key]);
    });
    iconsEl.appendChild(btn);
  }

  function popupHtml(item) {
    const meta = DATASETS[item.dataset] || { name: item.dataset };
    const propRows = Object.entries(item.props || {})
      .filter(([k, v]) => v != null && typeof v !== "object" && !k.startsWith("_"))
      .slice(0, 6)
      .map(([k, v]) => `<div class="pop-row"><span class="k">${k}</span><span class="v">${String(v)}</span></div>`)
      .join("");
    return `
      <div class="pop-title">${meta.name}</div>
      <div class="pop-id">${item.id ?? ""}</div>
      ${propRows}
    `;
  }

  async function load() {
    document.getElementById("status").textContent = "laden";
    for (const key of Object.keys(DATASETS)) {
      clusters[key].clearLayers();
      document.getElementById(`count-${key}`).textContent = "…";
    }
    try {
      const r = await fetch("/api/items");
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const counts = Object.fromEntries(Object.keys(DATASETS).map(k => [k, 0]));
      for (const item of data.items) {
        if (item.lat == null || item.lon == null) continue;
        const meta = DATASETS[item.dataset];
        if (!meta) continue;
        const icon = meta.featured ? benchMarkerIcon(meta.color) : dotIcon(meta.color);
        const marker = L.marker([item.lat, item.lon], { icon });
        marker.bindPopup(popupHtml(item));
        clusters[item.dataset].addLayer(marker);
        counts[item.dataset]++;
      }
      for (const key of Object.keys(DATASETS)) {
        const el = document.getElementById(`count-${key}`);
        const n = counts[key];
        // Korte notatie voor grote getallen op badge
        el.textContent = n >= 1000 ? Math.round(n / 100) / 10 + "k" : String(n);
      }
      document.getElementById("status").textContent = `${data.count.toLocaleString("nl-NL")}`;
    } catch (err) {
      document.getElementById("status").textContent = "fout";
      console.error(err);
    }
  }

  load();
</script>
</body>
</html>
