<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stephen's Bankjes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  :root {
    --cream:    #faf7f0;
    --paper:    #fffdf6;
    --moss:     #5b7a3f;
    --moss-2:   #7a8a47;
    --bark:     #6b5d4f;
    --rust:     #a06a3f;
    --plum:     #7a4a72;
    --osm:      #4a5d6a;
    --ink:      #2d2a26;
    --muted:    #857d72;
    --line:     rgba(45, 42, 38, 0.10);
    --line-strong: rgba(45, 42, 38, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: var(--cream);
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ========== Hero header ========== */
  header.topbar {
    background:
      linear-gradient(180deg, rgba(255,253,246,1) 0%, rgba(255,253,246,0.96) 100%);
    border-bottom: 1px solid var(--line);
    padding: 18px 22px 14px;
    position: relative;
    z-index: 500;
  }
  .hero {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .hero .mark {
    width: 28px;
    height: 28px;
    vertical-align: -4px;
    display: inline-block;
  }
  .hero .title {
    font-family: 'Fraunces', ui-serif, Georgia, serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.05;
    color: var(--ink);
    font-variation-settings: "opsz" 32;
    letter-spacing: -0.015em;
  }
  .hero .subtitle {
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    align-self: center;
  }
  .hero .research-link {
    align-self: center;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    border-bottom: 1px dotted var(--line-strong);
    padding-bottom: 1px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .hero .research-link:hover {
    color: var(--moss);
    border-bottom-color: var(--moss);
  }
  .hero .status {
    margin-left: auto;
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    align-self: center;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 14px 10px 12px;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease, border-color 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.1;
    box-shadow: 0 1px 2px rgba(45, 42, 38, 0.04);
  }
  .filter-btn:hover { border-color: var(--line-strong); }
  .filter-btn:active { transform: scale(0.97); }
  .filter-btn .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn .name { white-space: nowrap; }
  .filter-btn .count {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    font-weight: 500;
  }
  .filter-btn.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .filter-btn.on .count { color: rgba(255, 253, 246, 0.7); }
  .filter-btn.osm {
    border-style: dashed;
    border-color: var(--line-strong);
  }
  .filter-btn.osm .name::before {
    content: "+ ";
    color: var(--muted);
    font-weight: 600;
  }
  .filter-btn.osm.on .name::before {
    color: rgba(255, 253, 246, 0.7);
  }
  .filter-btn.loading {
    opacity: 0.5;
    pointer-events: none;
  }

  /* ========== Map ========== */
  #map {
    width: 100%;
    height: 100%;
    background: var(--cream);
  }
  .leaflet-tile-pane { filter: saturate(0.85) contrast(0.97); }
  .leaflet-control-attribution {
    background: rgba(255, 253, 246, 0.85) !important;
    color: var(--muted) !important;
    font-family: 'Inter', sans-serif;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--moss) !important; }

  /* ========== Locate-knop (rechtsonder) ========== */
  .locate-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255, 253, 246, 0.96);
    border: 1px solid var(--line-strong);
    box-shadow: 0 2px 6px rgba(45, 42, 38, 0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.18s ease;
    color: var(--ink);
  }
  .locate-btn:hover { background: var(--paper); }
  .locate-btn:active { transform: scale(0.94); }
  .locate-btn.busy { opacity: 0.55; pointer-events: none; }
  .locate-btn svg { display: block; }
  .leaflet-control.locate-wrap { margin-bottom: 14px !important; margin-right: 14px !important; }

  /* User-locatie marker (pulserend) */
  .user-loc {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--moss);
    border: 3px solid var(--paper);
    box-shadow: 0 0 0 4px rgba(91, 122, 63, 0.22), 0 1px 3px rgba(45, 42, 38, 0.4);
  }

  /* ========== Popups ========== */
  .leaflet-popup-content-wrapper {
    background: var(--paper);
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(45, 42, 38, 0.18), 0 0 0 1px var(--line);
  }
  .leaflet-popup-content { margin: 12px 14px; font-size: 12px; line-height: 1.5; min-width: 200px; }
  .leaflet-popup-tip { background: var(--paper); }
  .pop-title {
    font-family: 'Fraunces', ui-serif, Georgia, serif;
    font-weight: 500; font-size: 15px;
    margin-bottom: 2px;
    font-variation-settings: "opsz" 14;
  }
  .pop-source {
    display: inline-block;
    font-size: 9px; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .pop-id { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; word-break: break-all; }
  .pop-addr { font-size: 12px; color: var(--ink); margin-bottom: 6px; font-style: italic; }
  .pop-addr[data-loaded="true"] { font-style: normal; }
  .pop-row { display: grid; grid-template-columns: 96px 1fr; gap: 10px; padding: 1px 0; }
  .pop-row .k { color: var(--muted); font-size: 11px; }
  .pop-row .v { font-size: 12px; word-break: break-word; }
  .pop-photos {
    display: flex;
    gap: 4px;
    margin: 8px 0 4px;
    min-height: 0;
  }
  .pop-photos.empty { display: none; }
  .pop-photos a {
    flex: 1;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 6px;
    background: var(--cream);
    border: 1px solid var(--line);
    transition: opacity 0.15s ease, border-color 0.15s ease;
    line-height: 0;
  }
  .pop-photos a:hover {
    opacity: 0.92;
    border-color: var(--line-strong);
  }
  .pop-photos img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .pop-photos .placeholder {
    width: 100%;
    height: 100%;
    background: var(--cream);
    animation: pop-pulse 1.4s ease-in-out infinite;
  }
  @keyframes pop-pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 0.85; }
  }
  .pop-actions {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }
  .pop-actions a {
    font-size: 12px;
    color: var(--moss);
    text-decoration: none;
    border-bottom: 1px dotted var(--moss);
    padding-bottom: 1px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .pop-actions a:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  @media (max-width: 540px) {
    header.topbar { padding: 14px 16px 12px; }
    .hero .mark { width: 22px; height: 22px; vertical-align: -3px; }
    .hero .title { font-size: 24px; }
    .hero .subtitle { display: none; }
    .filters { gap: 6px; margin-top: 11px; }
    .filter-btn { padding: 8px 11px 8px 10px; font-size: 12px; }
  }
</style>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

<meta property="og:title" content="Stephen's Bankjes — Amsterdam straatmeubilair">
<meta property="og:description" content="Een verkenning van banken, picknicktafels en afvalbakken in Amsterdam via DSO + OSM open-data.">
<meta property="og:image" content="https://bankjes.stephensprive.app/static/og-banner.png">
<meta property="og:url" content="https://bankjes.stephensprive.app/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://bankjes.stephensprive.app/static/og-banner.png">
</head>
<body>
<header class="topbar">
  <div class="hero">
    <img class="mark" src="/static/silhouette.svg" alt="" width="28" height="28">
    <h1 class="title">Stephen's Bankjes</h1>
    <span class="subtitle">Amsterdam straatmeubilair</span>
    <a class="research-link" href="/onderzoek">onderzoek →</a>
    <span class="status" id="status">·</span>
  </div>
  <nav class="filters" id="filters"></nav>
</header>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(async function () {
  // Single source of truth: server. /api/datasets levert label, name, color,
  // sourceType ("dso"|"osm"), defaultOn, featured — geen dataset-config in JS.
  const datasetList = await (await fetch("/api/datasets")).json();
  const DATASETS = Object.fromEntries(datasetList.map(d => [d.label, d]));

  const map = L.map("map", {
    zoomControl: false,
    zoomAnimation: true,
    fadeAnimation: true,
    inertia: true,
    inertiaDeceleration: 2500,
    zoomAnimationDuration: 0.35,
  }).setView([52.3676, 4.9041], 13);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    subdomains: "abcd",
    attribution: '&copy; <a href="https://carto.com/" target="_blank" rel="noopener">CARTO</a> &middot; OSM &middot; <a href="https://api.data.amsterdam.nl/v1/" target="_blank" rel="noopener">data.amsterdam.nl</a>',
  }).addTo(map);

  function benchSvg(color, size) {
    size = size || 16;
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M5 12v6"/><path d="M19 12v6"/><path d="M5 8h14"/></svg>`;
  }

  function dotIcon(color, size) {
    size = size || 9;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:1.5px solid rgba(255,253,246,0.95);box-shadow:0 1px 2px rgba(45,42,38,0.35)"></div>`,
      className: "",
      iconSize: [size, size],
    });
  }

  function ringIcon(color, size) {
    size = size || 9;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(255,253,246,0.85);border:2px solid ${color};box-shadow:0 1px 1px rgba(45,42,38,0.20)"></div>`,
      className: "",
      iconSize: [size, size],
    });
  }

  function benchMarkerIcon(color) {
    return L.divIcon({
      html: `<div style="width:22px;height:22px;border-radius:50%;background:rgba(255,253,246,0.97);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(45,42,38,0.35);border:1.5px solid ${color}55">${benchSvg(color, 14)}</div>`,
      className: "",
      iconSize: [22, 22],
    });
  }

  // Cluster groups per dataset
  const clusters = {};
  const enabled = {};
  const loaded = {};
  for (const [key, meta] of Object.entries(DATASETS)) {
    enabled[key] = !!meta.defaultOn;
    loaded[key]  = false;
    clusters[key] = L.markerClusterGroup({
      chunkedLoading: true,
      animateAddingMarkers: false,
      iconCreateFunction: (cluster) => {
        const n = cluster.getChildCount();
        const size = meta.featured ? 36 : 30;
        return L.divIcon({
          html: `<div style="background:${meta.color};color:#fffdf6;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;font-family:Inter,sans-serif;border:2px solid rgba(255,253,246,0.95);box-shadow:0 1px 3px rgba(45,42,38,0.30)">${n}</div>`,
          className: "",
          iconSize: [size, size],
        });
      },
    });
    if (enabled[key]) clusters[key].addTo(map);
  }

  function inlineAddress(props) {
    // Sommige datasets hebben straatnaam/huisnummer/postcode native
    const street = props.straatnaam || props.openbareruimte || props["addr:street"];
    const num    = props.huisnummer || props["addr:housenumber"];
    const pc     = props.postcode   || props["addr:postcode"];
    if (street && num) return pc ? `${street} ${num}, ${pc}` : `${street} ${num}`;
    if (street)        return pc ? `${street}, ${pc}` : street;
    return null;
  }

  function popupHtml(item) {
    const meta = DATASETS[item.dataset] || { name: item.dataset, source: "?" };
    const sourceLabel = meta.sourceType === "osm"
      ? "Bron · OpenStreetMap"
      : "Bron · data.amsterdam.nl";
    const inline = inlineAddress(item.props || {});
    const addrBlock = inline
      ? `<div class="pop-addr" data-loaded="true">${inline}</div>`
      : `<div class="pop-addr" data-lat="${item.lat}" data-lon="${item.lon}">Adres opzoeken…</div>`;
    const propRows = Object.entries(item.props || {})
      .filter(([k, v]) => v != null && typeof v !== "object" && !k.startsWith("_"))
      .filter(([k]) => !["straatnaam", "huisnummer", "postcode", "openbareruimte"].includes(k))
      .slice(0, 6)
      .map(([k, v]) => `<div class="pop-row"><span class="k">${k}</span><span class="v">${String(v)}</span></div>`)
      .join("");
    const streetViewUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${item.lat},${item.lon}`;
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;
    const photosBlock = `<div class="pop-photos" data-lat="${item.lat}" data-lon="${item.lon}">
        <div class="placeholder"></div><div class="placeholder"></div><div class="placeholder"></div>
      </div>`;
    return `
      <div class="pop-title">${meta.name}</div>
      <span class="pop-source">${sourceLabel}</span>
      ${addrBlock}
      ${photosBlock}
      <div class="pop-id">${item.id ?? ""}</div>
      ${propRows}
      <div class="pop-actions">
        <a href="${streetViewUrl}" target="_blank" rel="noopener">↗ Street View</a>
        <a href="${mapsUrl}" target="_blank" rel="noopener">↗ Open in Maps</a>
      </div>
    `;
  }

  // Cache voor reverse-geocode: lat,lon → adres
  const addrCache = new Map();

  async function reverseGeocode(lat, lon) {
    const key = `${lat.toFixed(5)},${lon.toFixed(5)}`;
    if (addrCache.has(key)) return addrCache.get(key);
    try {
      const url = `https://api.pdok.nl/bzk/locatieserver/search/v3_1/reverse?lat=${lat}&lon=${lon}&rows=1&fl=weergavenaam,straatnaam,huisnummer,postcode`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      const doc = (d.response?.docs || [])[0];
      const result = doc?.weergavenaam ?? null;
      addrCache.set(key, result);
      return result;
    } catch (e) {
      addrCache.set(key, null);
      return null;
    }
  }

  const photoCache = new Map();

  async function loadPhotos(photoEl) {
    if (photoEl.dataset.loaded) return;
    photoEl.dataset.loaded = "true";
    const lat = parseFloat(photoEl.dataset.lat);
    const lon = parseFloat(photoEl.dataset.lon);
    const key = `${lat.toFixed(5)},${lon.toFixed(5)}`;
    let data = photoCache.get(key);
    if (!data) {
      try {
        const r = await fetch(`/api/photos?lat=${lat}&lon=${lon}&radius=50&limit=3`);
        data = await r.json();
        photoCache.set(key, data);
      } catch (err) {
        console.error("photo fetch", err);
        photoEl.classList.add("empty");
        return;
      }
    }
    const photos = data.photos || [];
    if (photos.length === 0) {
      photoEl.classList.add("empty");
      return;
    }
    photoEl.innerHTML = photos.map(p => {
      const when = p.captured_at ? new Date(p.captured_at).toLocaleDateString("nl-NL", { year: "numeric", month: "short" }) : "";
      return `<a href="${p.url}" target="_blank" rel="noopener" title="Mapillary · ${when}"><img src="${p.thumb}" loading="lazy" alt=""></a>`;
    }).join("");
  }

  map.on("popupopen", async (e) => {
    const root = e.popup.getElement();
    if (!root) return;

    const addrEl = root.querySelector(".pop-addr");
    if (addrEl && !addrEl.dataset.loaded) {
      const lat = parseFloat(addrEl.dataset.lat);
      const lon = parseFloat(addrEl.dataset.lon);
      const addr = await reverseGeocode(lat, lon);
      addrEl.dataset.loaded = "true";
      addrEl.textContent = addr || "(geen adres in BAG)";
      e.popup.update();
    }

    const photoEl = root.querySelector(".pop-photos");
    if (photoEl) {
      await loadPhotos(photoEl);
      e.popup.update();
    }
  });

  function addItemsToCluster(key, items) {
    const meta = DATASETS[key];
    let icon;
    if (meta.featured)            icon = (item) => benchMarkerIcon(meta.color);
    else if (meta.sourceType === "osm") icon = (item) => ringIcon(meta.color, 8);
    else                          icon = (item) => dotIcon(meta.color);

    const markers = [];
    for (const item of items) {
      if (item.lat == null || item.lon == null) continue;
      const m = L.marker([item.lat, item.lon], { icon: icon(item) });
      m.bindPopup(popupHtml({ ...item, dataset: key }));
      markers.push(m);
    }
    clusters[key].addLayers(markers);
    return markers.length;
  }

  // Lazy load: alleen ophalen wanneer toggle aan staat en nog niet geladen
  async function ensureLoaded(key) {
    if (loaded[key]) return;
    const btn = document.querySelector(`.filter-btn[data-key="${key}"]`);
    btn?.classList.add("loading");
    try {
      const r = await fetch(`/api/items?dataset=${encodeURIComponent(key)}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const n = addItemsToCluster(key, data.items);
      loaded[key] = true;
      const countEl = document.getElementById(`count-${key}`);
      if (countEl) countEl.textContent = formatCount(n);
      updateStatus();
    } catch (err) {
      console.error("load error", key, err);
      const countEl = document.getElementById(`count-${key}`);
      if (countEl) countEl.textContent = "fout";
    } finally {
      btn?.classList.remove("loading");
    }
  }

  function formatCount(n) {
    return n >= 1000 ? (Math.round(n / 100) / 10) + "k" : String(n);
  }

  function updateStatus() {
    let total = 0;
    for (const key of Object.keys(DATASETS)) {
      if (enabled[key] && loaded[key]) {
        total += clusters[key].getLayers().length;
      }
    }
    document.getElementById("status").textContent = total
      ? `${total.toLocaleString("nl-NL")} zichtbaar`
      : "niets aan";
  }

  // Bouw filter-buttons
  const filtersEl = document.getElementById("filters");
  for (const [key, meta] of Object.entries(DATASETS)) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "filter-btn"
      + (enabled[key] ? " on" : "")
      + (meta.sourceType === "osm" ? " osm" : "");
    btn.dataset.key = key;
    btn.title = meta.sourceType === "osm"
      ? `${meta.name} — secundaire bron, crowd-sourced`
      : meta.name;
    btn.innerHTML = `
      <span class="swatch" style="background:${meta.color}"></span>
      <span class="name">${meta.name}</span>
      <span class="count" id="count-${key}">…</span>
    `;
    btn.addEventListener("click", async () => {
      enabled[key] = !enabled[key];
      btn.classList.toggle("on", enabled[key]);
      if (enabled[key]) {
        clusters[key].addTo(map);
        await ensureLoaded(key);
      } else {
        map.removeLayer(clusters[key]);
        updateStatus();
      }
    });
    filtersEl.appendChild(btn);
  }

  // ========== Locate-knop + auto-locate bij opening ==========
  const LocateControl = L.Control.extend({
    options: { position: "bottomright" },
    onAdd: function () {
      L.DomUtil.create("div");
      const wrap = L.DomUtil.create("div", "leaflet-control locate-wrap");
      const btn = L.DomUtil.create("button", "locate-btn", wrap);
      btn.type = "button";
      btn.title = "Mijn locatie";
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>`;
      L.DomEvent.disableClickPropagation(wrap);
      L.DomEvent.on(btn, "click", () => locate({ fly: true }));
      this._btn = btn;
      return wrap;
    },
    setBusy(busy) { if (this._btn) this._btn.classList.toggle("busy", !!busy); },
  });
  const locateControl = new LocateControl();
  locateControl.addTo(map);

  let userMarker = null;

  function locate({ fly = true, silentFail = false } = {}) {
    if (!navigator.geolocation) {
      if (!silentFail) console.warn("Geolocation niet beschikbaar");
      return;
    }
    locateControl.setBusy(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        const ll = [latitude, longitude];
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker(ll, {
          icon: L.divIcon({ className: "", html: `<div class="user-loc"></div>`, iconSize: [14, 14] }),
          interactive: false,
          keyboard: false,
        }).addTo(map);
        if (fly) map.flyTo(ll, 16, { duration: 0.9 });
        locateControl.setBusy(false);
      },
      (err) => {
        locateControl.setBusy(false);
        if (!silentFail) console.warn("Geolocation fout:", err.message);
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }

  // Initieel: laad alleen wat default-on staat, en probeer locatie
  const initial = Object.keys(DATASETS).filter(k => enabled[k]);
  await Promise.all(initial.map(ensureLoaded));
  // Auto-locate na laden — silent fail als gebruiker weigert of in headless context
  locate({ fly: true, silentFail: true });

})().catch(err => {
  console.error("init failed", err);
  const s = document.getElementById("status");
  if (s) s.textContent = "fout bij init";
});
</script>
</body>
</html>
