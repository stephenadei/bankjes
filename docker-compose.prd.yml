services:
  bankjes:
    image: ghcr.io/stephenadei/bankjes:prd
    container_name: bankjes
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env.prd
    ports:
      - "127.0.0.1:4307:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
