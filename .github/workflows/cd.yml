name: cd

on:
  push:
    branches: [master, develop]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target env
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
            echo "branch=master" >> $GITHUB_OUTPUT
          else
            echo "env=acc" >> $GITHUB_OUTPUT
            echo "branch=develop" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Run tests
        run: |
          pip install -r requirements.txt pytest pytest-asyncio
          pytest -q

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/stephenadei/bankjes:${{ steps.env.outputs.env }}
            ghcr.io/stephenadei/bankjes:${{ steps.env.outputs.env }}-${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/stephen/projects/bankjes-${{ steps.env.outputs.env }}
            # Use the workflow's GITHUB_TOKEN directly in the fetch URL so we
            # bypass whichever gh account happens to be "active" on the VPS.
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ steps.env.outputs.branch }}
            git checkout -B ${{ steps.env.outputs.branch }} FETCH_HEAD
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            ./scripts/deploy.sh ${{ steps.env.outputs.env }}
