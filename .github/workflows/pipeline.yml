name: pipeline

on:
  pull_request:
    branches: [master, develop, pre]
  push:
    branches: [master, develop, pre]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target env
        id: env
        run: |
          case "${{ github.ref }}" in
            refs/heads/master)
              echo "env=prd" >> $GITHUB_OUTPUT
              echo "branch=master" >> $GITHUB_OUTPUT ;;
            refs/heads/develop)
              echo "env=acc" >> $GITHUB_OUTPUT
              echo "branch=develop" >> $GITHUB_OUTPUT ;;
            refs/heads/pre)
              echo "env=pre" >> $GITHUB_OUTPUT
              echo "branch=pre" >> $GITHUB_OUTPUT ;;
            *)
              echo "Unsupported branch: ${{ github.ref }}" >&2
              exit 1 ;;
          esac

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/stephenadei/bankjes:${{ steps.env.outputs.env }}
            ghcr.io/stephenadei/bankjes:${{ steps.env.outputs.env }}-${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/stephen/projects/bankjes-${{ steps.env.outputs.env }}
            # Use the workflow's GITHUB_TOKEN directly in the fetch URL so we
            # bypass whichever gh account happens to be "active" on the VPS.
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ steps.env.outputs.branch }}
            git checkout -B ${{ steps.env.outputs.branch }} FETCH_HEAD
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            ./scripts/deploy.sh ${{ steps.env.outputs.env }}
